services:

  account-service:
    image: pintu889/account-service:latest
    container_name: account-service
    ports:
      - "8081:8081"
    restart: unless-stopped

  event-gateway:
    image: pintu889/event-gateway:latest
    container_name: event-gateway
    ports:
      - "8080:8080"
    depends_on:
      - account-service
    environment:
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
    restart: unless-stopped